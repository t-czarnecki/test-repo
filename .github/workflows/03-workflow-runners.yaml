---
name: 03 – Workflow Runners
on: 
  workflow_dispatch:

jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        run: |
          echo "This job is running on an Ubuntu runner."
          echo "$RUNNER_OS"
          cat /proc/cpuinfo
          cat /proc/meminfo
  windows-echo:
    runs-on: windows-latest
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "This job is running on a Windows runner."
          echo "$RUNNER_OS"
          systeminfo
  mac-echo:
    runs-on: macos-latest
    steps:
      - name: Show OS
        run: |
          echo "This job is running on a MacOS runner."
          echo "$RUNNER_OS"

self-hosted-echo:
    runs-on: tcz
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "This job is running on a self-hosted runner."
          echo "$RUNNER_OS"
          ip a