---
name: 05 – 1 – Event Filters and Activity Types
on: 
  workflow_dispatch:
jobs:
    build:
    runs-on: ubuntu-latest
    defaults:
        run:
           shell: bash
           working-directory: cwiczenia/docker-app-02
        
        env:
            IMAGE_NAME: webapp
            TAG: ${{ github.sha }}
            HOST_PORT: 8080          # port na hoście (runner)
            CONTAINER_PORT: 80       # port w kontenerze, zmień jeśli w Twoim obrazie jest inny (np. 8080)
        
        steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Wersje narzędzi
          run: |
            set -euxo pipefail
            docker --version
            curl --version